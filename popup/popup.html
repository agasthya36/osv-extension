<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSV Security Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      padding: 16px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon { font-size: 24px; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 11px;
      color: #64748b;
      margin-top: 1px;
    }

    .status-section {
      padding: 14px 16px;
    }

    .status-card {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px 14px;
      border: 1px solid #334155;
    }

    .status-card.active {
      border-color: #22c55e;
      background: #052e16;
    }

    .status-card.inactive {
      border-color: #334155;
    }

    .status-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .status-value {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.yellow { background: #f59e0b; }
    .dot.red { background: #ef4444; }

    .supported-sites {
      padding: 0 16px 14px;
    }

    .section-title {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .site-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .site-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #1e293b;
      border-radius: 6px;
      border: 1px solid #334155;
    }

    .site-item .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-npm    { background: #cb3837; color: #fff; }
    .badge-pypi   { background: #3775a9; color: #fff; }
    .badge-maven  { background: #c71a36; color: #fff; }

    .site-url { color: #94a3b8; font-size: 12px; }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer a {
      font-size: 11px;
      color: #3b82f6;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    .version {
      font-size: 11px;
      color: #475569;
    }

    #current-page-info {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🛡️</div>
    <div class="header-text">
      <h1>OSV Security Scanner</h1>
      <p>Powered by osv.dev</p>
    </div>
  </div>

  <div class="status-section">
    <div class="status-card" id="status-card">
      <div class="status-label">Current Page</div>
      <div class="status-value">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Checking…</span>
      </div>
      <div id="current-page-info"></div>
    </div>
  </div>

  <div class="supported-sites">
    <div class="section-title">Supported Registries</div>
    <div class="site-list">
      <div class="site-item">
        <span class="badge badge-npm">npm</span>
        <span class="site-url">npmjs.com/package/*</span>
      </div>
      <div class="site-item">
        <span class="badge badge-pypi">PyPI</span>
        <span class="site-url">pypi.org/project/*</span>
      </div>
      <div class="site-item">
        <span class="badge badge-maven">Maven</span>
        <span class="site-url">central.sonatype.com/artifact/*</span>
      </div>
      <div class="site-item">
        <span class="badge badge-maven">Maven</span>
        <span class="site-url">mvnrepository.com/artifact/*</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://osv.dev" target="_blank">osv.dev ↗</a>
    <span class="version">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
